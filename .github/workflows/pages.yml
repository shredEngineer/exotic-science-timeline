name: Build and deploy the page

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      pin: ${{ steps.pin.outputs.pin }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Publication gate, re-asserted at the surface that actually publishes.
      # The pinned base passed this upstream; a page must not rely on that alone.
      - name: No unsourced allegation against a named person
        run: python3 tools/check-persons.py

      # Conformance gate: every record agrees with the pinned standard
      # vocabulary — enum membership, derived axes, derived signatures,
      # epistemotype boundaries, citation floor. Interprets the standard's
      # own derivation_rules table; also verifies the vendored vocabulary
      # matches standard/PIN.
      - name: Corpus agrees with the pinned standard vocabulary
        run: python3 tools/check-coordinates.py

      - name: Regenerate the dating layer
        run: |
          python3 tools/timeline-extract.py
          git diff --exit-code derived/timeline.json \
            || { echo "::error::derived/timeline.json is stale — re-run tools/timeline-extract.py"; exit 1; }

      - name: Build
        run: python3 tools/build.py

      # enablement: true removes the ordering dependency — without it the job
      # fails whenever it runs before Pages has been switched on for the repo,
      # which is every push made during setup.
      # The deploy job does not check out the repository, so anything it needs
      # from the tree has to be handed over as an output. A content hash of the
      # built page identifies THIS build to the post-deploy check.
      - name: Fingerprint this build
        id: pin
        run: echo "pin=$(sha256sum dist/index.html | cut -c1-16)" >> "$GITHUB_OUTPUT"

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # A green deploy step is not proof the site serves. Fetch what the world
      # fetches, and fail if it does not come back.
      # A 200 is not proof the NEW build is being served: a CDN can answer with
      # the previous revision. Verify the served page carries the pin this run
      # just built, not merely that something answered.
      - name: Verify the published site serves this build
        run: |
          url="${{ steps.deployment.outputs.page_url }}"
          pin="${{ needs.build.outputs.pin }}"
          echo "verifying $url serves build $pin"
          for i in 1 2 3 4 5 6; do
            code=$(curl -sS -H 'Cache-Control: no-cache' -o /tmp/page.html \
                     -w '%{http_code}' --max-time 20 "$url" || echo 000)
            got=$(sha256sum /tmp/page.html 2>/dev/null | cut -c1-16)
            if [ "$code" = "200" ] && [ "$got" = "$pin" ]; then
              served=yes; break
            fi
            echo "attempt $i: http=$code, pin not yet served — retrying"; sleep 10
          done
          [ "${served:-no}" = "yes" ] || {
            echo "::error::published site did not serve this build (http=$code)"; exit 1; }
          grep -q 'const DATA' /tmp/page.html \
            || { echo "::error::page served but carries no data block"; exit 1; }
          echo "ok: this build is live and carries its data"
